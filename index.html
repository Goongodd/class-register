<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Class Register · Jewel</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Outfit:wght@300;400;500;600;700&display=swap');
:root{
  --ink:#0d1b2a;--paper:#f7f3ee;--cream:#ede8e0;
  --navy:#1a2e4a;--navy2:#243d5f;--blue:#3b6ea5;--lblue:#d6e8f7;
  --gold:#d4943a;--lgold:#fef3dc;
  --green:#1e6b4a;--lgreen:#dcf0e6;
  --red:#b52b2b;--lred:#fde8e8;
  --late:#c47a1a;--llate:#fef3d6;
  --purple:#6b3fa0;--lpurple:#f0e6f6;
  --muted:#8a9ab0;--border:#e5e0d8;
  --radius:14px;--shadow:0 4px 32px rgba(13,27,42,.10);--shadow-sm:0 2px 10px rgba(13,27,42,.07);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Outfit',sans-serif;background:var(--paper);color:var(--ink);min-height:100dvh;padding-bottom:110px;-webkit-font-smoothing:antialiased;}

/* AUTH & LOADING */
.loading{position:fixed;inset:0;background:rgba(26,46,74,.75);display:flex;align-items:center;justify-content:center;z-index:500;backdrop-filter:blur(4px);}.loading.hidden{display:none;}
.spinner{width:38px;height:38px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.auth-screen{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;z-index:1000;transition:opacity .4s;}.auth-screen.hidden{opacity:0;pointer-events:none;}
.auth-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:24px;width:100%;max-width:360px;}
.auth-field input{width:100%;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);border-radius:10px;padding:12px 14px;color:#fff;outline:none;}
.auth-btn{width:100%;padding:14px;background:var(--gold);border:none;border-radius:10px;font-weight:700;color:#fff;cursor:pointer;margin-top:10px;}

/* HEADER */
header{background:var(--navy);color:#fff;padding:12px 14px 10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.2);}
.hrow{display:flex;justify-content:space-between;align-items:center;}
header h1{font-family:'Playfair Display',serif;font-size:16px;}
.date-chip{background:var(--gold);color:#fff;font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px;}

/* NAV */
.nav-bar{background:var(--cream);border-bottom:1px solid var(--border);padding:7px 12px;display:flex;gap:6px;overflow-x:auto;position:sticky;top:60px;z-index:99;}
.nav-btn{background:#fff;border:1.5px solid #ccc8be;border-radius:7px;padding:4px 10px;font-size:10px;font-weight:600;white-space:nowrap;}
.nav-btn.active{background:var(--navy);color:#fff;}

/* SUMMARY TABLE (From Screenshot) */
.term-summary-wrap{background:#fff;margin:0 10px 15px;border-radius:var(--radius);padding:12px;box-shadow:var(--shadow-sm);overflow-x:auto;}
.term-table{width:100%;border-collapse:collapse;font-size:11px;}
.term-table th{text-align:left;color:var(--muted);text-transform:uppercase;padding:8px 4px;border-bottom:1px solid var(--cream);}
.term-table td{padding:10px 4px;border-bottom:1px solid var(--cream);font-weight:500;}
.term-table tr:last-child td{border-bottom:none;}
.term-table .pct-cell{font-weight:700;color:var(--navy);}

/* UI UTILS */
.view{display:none;}.view.on{display:block;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:8px 18px;border-radius:30px;font-size:11px;opacity:0;transition:.3s;z-index:400;}.toast.show{opacity:1;}
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid var(--border);display:flex;padding:8px 0;z-index:200;min-height:60px;}
.bb{flex:1;text-align:center;font-size:10px;font-weight:700;color:#bbb;background:none;border:none;cursor:pointer;}
.bb.active{color:var(--navy);}
</style>
</head>
<body>

<div class="loading" id="loading"><div class="spinner"></div></div>

<div class="auth-screen" id="authScreen">
  <h2 style="color:#fff; margin-bottom:20px;">Class Register</h2>
  <div class="auth-card">
    <div class="auth-field"><input type="email" id="loginEmail" placeholder="Email"/></div>
    <div class="auth-field"><input type="password" id="loginPassword" placeholder="Password"/></div>
    <button class="auth-btn" onclick="doLogin()">Sign In</button>
  </div>
</div>

<header>
  <div class="hrow">
    <h1 id="hdrTitle">Class Register</h1>
    <div class="date-chip" id="datechip"></div>
    <button onclick="doLogout()" style="background:none; border:none; color:#fff; font-size:10px;">Sign Out</button>
  </div>
</header>

<div class="nav-bar" id="weekNav"></div>

<div class="view on" id="vAttend">
  <div style="padding:15px 10px;">
    <label style="font-size:11px; font-weight:700;">📅 Week Ending:</label>
    <input type="date" id="wkEndDate" onchange="saveGlobalSettings()" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd; margin-top:5px;">
  </div>
  <div id="studentList"></div>
</div>

<div class="view" id="vSummary">
  <div class="sec" style="margin-top:15px;">Termly Attendance Summary</div>
  <div class="term-summary-wrap" id="termSummaryContainer">
    </div>
</div>

<div class="view" id="vSettings">
  <div style="padding:15px;">
    <h3>Class Settings</h3>
    <div style="margin-top:15px;">
      <label style="font-size:11px; font-weight:700;">Days School Opened:</label>
      <input type="number" id="cfg_days_open" onchange="saveGlobalSettings()" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;">
    </div>
  </div>
</div>

<nav class="bnav">
  <button class="bb active" id="bb0" onclick="switchView(0)">Attendance</button>
  <button class="bb" id="bb1" onclick="switchView(1)">Summary</button>
  <button class="bb" id="bb4" onclick="switchView(4)">Settings</button>
</nav>

<div class="toast" id="toast"></div>

<script>
// INITIALIZE SUPABASE (Replace with your keys)
const sb = supabase.createClient('YOUR_URL', 'YOUR_KEY');

let user = null;
let students = [];
let attendanceData = {};
let currentWeek = 1;

// --- PERSISTENCE LOGIC ---

async function saveGlobalSettings() {
  const payload = {
    user_id: user.id,
    week_ending: document.getElementById('wkEndDate').value,
    days_open: document.getElementById('cfg_days_open').value,
    students: students
  };
  
  const { error } = await sb.from('user_settings').upsert(payload);
  if(!error) showToast("Cloud Synced ✓");
}

async function loadUserData() {
  document.getElementById('loading').classList.remove('hidden');
  
  // Load Settings
  let { data: settings } = await sb.from('user_settings').select('*').single();
  if(settings) {
    document.getElementById('wkEndDate').value = settings.week_ending;
    document.getElementById('cfg_days_open').value = settings.days_open;
    students = settings.students;
  }
  
  renderAttendance();
  renderTermlyTable();
  document.getElementById('loading').classList.add('hidden');
}

// --- UI LOGIC ---

function switchView(idx) {
  const views = ['vAttend', 'vSummary', '', '', 'vSettings'];
  views.forEach((v, i) => {
    if(v) {
      document.getElementById(v).classList.toggle('on', i === idx);
      document.getElementById('bb'+i)?.classList.toggle('active', i === idx);
    }
  });
  if(idx === 1) renderTermlyTable();
}

function renderTermlyTable() {
  const daysOpen = parseInt(document.getElementById('cfg_days_open').value) || 0;
  let html = `<table class="term-table">
    <thead><tr><th>Name</th><th>Opened</th><th>Present</th><th>Absent</th><th>%</th></tr></thead>
    <tbody>`;
    
  students.forEach(s => {
    const present = 0; // Calculate from your attendance table
    const absent = daysOpen - present;
    const pct = daysOpen > 0 ? ((present / daysOpen) * 100).toFixed(1) : 0;
    html += `<tr><td>${s.name}</td><td>${daysOpen}</td><td>${present}</td><td>${absent}</td><td class="pct-cell">${pct}%</td></tr>`;
  });
  
  html += `</tbody></table>`;
  document.getElementById('termSummaryContainer').innerHTML = html;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Auth simulation - connect to your existing doLogin/doLogout logic
async function doLogin() {
  // Your existing login logic...
  // After success:
  user = { id: 'test' }; 
  document.getElementById('authScreen').classList.add('hidden');
  await loadUserData();
}
</script>
</body>
</html>
